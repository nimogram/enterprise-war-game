<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Enterprise: Strategic HUD</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: Inter, sans-serif; background:#020617; color:#94a3b8; }

/* animations */
@keyframes blink {0%,100%{opacity:1}50%{opacity:.4}}
.animate-blink{animation:blink 1s infinite}

.glass{background:rgba(15,23,42,.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1)}
</style>
</head>

<body class="overflow-hidden">
<div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col">

<!-- HEADER -->
<header class="p-4 border-b border-slate-800 flex justify-between">
  <div>
    <div class="text-xs text-yellow-400 tracking-widest">THE ENTERPRISE</div>
    <div id="phase" class="text-3xl text-white">FY26M1</div>
  </div>
  <div class="text-right">
    <div class="text-xs text-slate-500">MH</div>
    <div id="mh" class="text-3xl text-green-400">20</div>
  </div>
</header>

<!-- GRID -->
<main class="flex-1 flex items-center justify-center p-4">
  <div id="grid" class="grid grid-cols-8 gap-1 w-full aspect-square"></div>
</main>

<!-- TASK -->
<div class="p-4 border-t border-slate-800">
  <button id="execute" class="w-full py-3 bg-white text-black font-bold disabled:opacity-30">
    EXECUTE
  </button>
</div>

</div>

<script>
const MAX_MH = 20;

const state = {
  month:1,
  mh:MAX_MH,
  selected:null,
  customers:[
    {id:1,name:"札幌市",tiles:10,vendor:"D",month:48,visit:0},
    {id:2,name:"北海道庁",tiles:8,vendor:"I",month:30,visit:0},
    {id:3,name:"北大",tiles:6,vendor:"A",month:20,visit:0}
  ]
};

const el = {
  grid:document.getElementById("grid"),
  phase:document.getElementById("phase"),
  mh:document.getElementById("mh"),
  execute:document.getElementById("execute")
};

/* ---------- CORE ---------- */

function render(){
  el.phase.textContent = `FY26M${state.month}`;
  el.mh.textContent = state.mh;

  renderGrid();
}

function renderGrid(){
  el.grid.innerHTML = "";

  let tiles = [];

  state.customers.forEach(c=>{
    for(let i=0;i<c.tiles;i++){
      tiles.push(c);
    }
  });

  while(tiles.length<64) tiles.push(null);

  tiles.forEach(c=>{
    const div=document.createElement("div");

    div.className="aspect-square border border-slate-700 cursor-pointer flex items-center justify-center text-xs";

    if(c){
      div.textContent = "Y"+Math.ceil(c.month/12);
      div.style.background = getColor(c.vendor);

      if(state.selected===c.id){
        div.classList.add("ring-2","ring-white");
      }

      div.onclick=()=>{
        state.selected=c.id;
        render();
      };
    }

    el.grid.appendChild(div);
  });
}

/* ---------- LOGIC ---------- */

function getColor(v){
  return {
    H:"#064e3b",
    D:"#0f172a",
    I:"#075985",
    A:"#4c1d95"
  }[v] || "#111";
}

/* ---------- ACTION ---------- */

el.execute.onclick = ()=>{
  state.month++;
  state.mh = MAX_MH;

  state.customers.forEach(c=>{
    c.month++;
  });

  render();
};

/* ---------- INIT ---------- */
render();
lucide.createIcons();
</script>

</body>
</html>
