<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>THE ENTERPRISE: 覇権奪還</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-dim: #6b5520;
            --emerald: #00D68F;
            --rose: #FF4D6D;
            --sky: #38BDF8;
            --bg: #080C14;
            --surface: #0D1420;
            --border: rgba(255,255,255,0.06);
            --text-muted: #3a4a60;
            --font-display: 'Bebas Neue', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --font-body: 'Outfit', sans-serif;
            /* Vendor colors */
            --vendor-H: #0A3D2B;
            --vendor-H-bright: #00D68F;
            --vendor-I: #0A1F3D;
            --vendor-I-bright: #38BDF8;
            --vendor-A: #2D0A3D;
            --vendor-A-bright: #A855F7;
            --vendor-UNKNOWN: #141C28;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: #8899aa;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Subtle scanline overlay */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
            pointer-events: none; z-index: 9999;
        }

        #app {
            width: 100%; max-width: 430px;
            height: 100dvh;
            display: flex; flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ─── HEADER ─── */
        .hdr {
            padding: 16px 20px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .hdr-top {
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .hdr-label {
            font-family: var(--font-display);
            font-size: 9px;
            letter-spacing: 0.6em;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .hdr-label::before {
            content: '';
            display: inline-block;
            width: 5px; height: 5px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .hdr-phase {
            font-family: var(--font-display);
            font-size: 52px;
            color: #fff;
            line-height: 1;
            letter-spacing: 0.04em;
        }
        .hdr-mh {
            text-align: right;
        }
        .hdr-mh-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.4em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .hdr-mh-val {
            font-family: var(--font-display);
            font-size: 42px;
            color: var(--emerald);
            line-height: 1;
        }
        .hdr-mh-val.danger { color: var(--rose); }

        /* ─── SHARE BAR ─── */
        .share-bar {
            height: 3px;
            display: flex;
            overflow: hidden;
            margin: 8px 20px 0;
            border-radius: 2px;
        }
        .share-seg { height: 100%; transition: width 0.8s ease; }

        /* ─── GRID AREA ─── */
        .grid-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            position: relative;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            width: 100%;
            aspect-ratio: 1;
        }
        .tile {
            aspect-ratio: 1;
            border-radius: 8px;
            border: 1.5px solid rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            user-select: none;
        }
        .tile:active { transform: scale(0.9); }
        .tile.selected {
            border-color: #fff !important;
            box-shadow: 0 0 16px rgba(255,255,255,0.4), inset 0 0 8px rgba(255,255,255,0.05);
            transform: scale(1.08);
            z-index: 10;
        }
        .tile .t-label {
            font-family: var(--font-mono);
            font-size: 8px;
            color: rgba(255,255,255,0.35);
            pointer-events: none;
        }
        @keyframes rfp-glow {
            0%,100% { box-shadow: 0 0 10px var(--gold), inset 0 0 6px rgba(201,168,76,0.15); border-color: var(--gold); }
            50%      { box-shadow: 0 0 20px var(--gold), inset 0 0 12px rgba(201,168,76,0.25); border-color: #ffe68a; }
        }
        @keyframes build-glow {
            0%,100% { box-shadow: 0 0 8px rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
            50%      { box-shadow: 0 0 16px rgba(255,255,255,0.5); border-color: #fff; }
        }
        @keyframes changed-glow {
            0%,100% { box-shadow: 0 0 14px #f472b6; border-color: #f472b6; }
            50%      { box-shadow: 0 0 28px #f472b6, inset 0 0 10px rgba(244,114,182,0.2); border-color: #fce7f3; }
        }
        @keyframes incident-flash { 0%,100%{background-color:#5c0a0a} 50%{background-color:#b91c1c} }
        .tile.rfp-anim    { animation: rfp-glow 1.2s infinite ease-in-out; }
        .tile.build-anim  { animation: build-glow 1.6s infinite ease-in-out; }
        .tile.changed-anim{ animation: changed-glow 1.0s infinite ease-in-out; }
        .tile.incident-anim{ animation: incident-flash 0.6s infinite ease-in-out; }

        /* ─── SIDE PANEL ─── */
        .side-panel {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 72%;
            background: rgba(10,16,28,0.92);
            backdrop-filter: blur(32px);
            border-left: 1px solid var(--border);
            padding: 20px 18px;
            display: flex; flex-direction: column; gap: 12px;
            z-index: 120;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .side-panel.open { transform: translateX(0); }

        .sp-header { display: flex; justify-content: space-between; align-items: center; }
        .sp-tag {
            font-size: 8px; font-weight: 700; letter-spacing: 0.5em;
            color: var(--emerald); text-transform: uppercase;
        }
        .sp-close {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 4px; font-size: 20px; line-height: 1;
            transition: color 0.2s;
        }
        .sp-close:hover { color: #fff; }
        .sp-name {
            font-family: var(--font-display);
            font-size: 28px; color: #fff; letter-spacing: 0.03em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sp-full {
            font-size: 11px; color: #556677; line-height: 1.5;
            border-left: 3px solid var(--gold); padding-left: 8px;
        }
        .sp-stat-row { display: flex; gap: 8px; }
        .sp-stat {
            flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px;
        }
        .sp-stat-label { font-size: 7px; font-weight: 700; letter-spacing: 0.4em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .sp-stat-val { font-family: var(--font-display); font-size: 26px; color: #fff; }
        .sp-win {
            font-family: var(--font-display);
            font-size: 54px; color: var(--emerald); line-height: 1;
        }
        .sp-vendor-label { font-size: 7px; font-weight: 700; letter-spacing: 0.4em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 3px; }
        .sp-vendor-val { font-family: var(--font-display); font-size: 18px; color: var(--gold); letter-spacing: 0.1em; }
        .sp-status { font-size: 11px; font-weight: 600; color: #fff; }
        .sp-status.rfp { color: #fbbf24; animation: pulse 1s infinite; }
        .sp-status.build { color: var(--text-muted); }
        .sp-status.unknown { color: var(--text-muted); font-style: italic; }

        .sp-btns { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
        .sp-btn {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08);
            color: #667788; border-radius: 12px; padding: 10px;
            font-family: var(--font-display); font-size: 14px; letter-spacing: 0.12em;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        }
        .sp-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
        .sp-btn.primary {
            background: rgba(0,214,143,0.1); border-color: var(--emerald); color: var(--emerald);
        }
        .sp-btn.primary:hover { background: rgba(0,214,143,0.2); }
        .sp-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* ─── TASK STRIP ─── */
        .task-strip {
            height: 56px; overflow-x: auto; overflow-y: hidden;
            display: flex; align-items: center; gap: 6px;
            padding: 0 16px;
            border-top: 1px solid var(--border);
            scrollbar-width: none; flex-shrink: 0;
        }
        .task-strip::-webkit-scrollbar { display: none; }
        .task-chip {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 4px 10px 4px 12px;
            font-size: 10px; font-weight: 600; color: #cce;
            white-space: nowrap; animation: chip-in 0.3s ease;
        }
        @keyframes chip-in { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
        .task-chip-name { color: var(--emerald); font-family: var(--font-mono); font-size: 9px; }
        .task-chip-rm {
            background: none; border: none; color: #556677; cursor: pointer;
            font-size: 14px; line-height: 1; padding: 0;
            transition: color 0.2s;
        }
        .task-chip-rm:hover { color: var(--rose); }
        .task-standby {
            font-size: 10px; font-weight: 700; letter-spacing: 0.5em;
            color: var(--text-muted); text-transform: uppercase; font-family: var(--font-mono);
            white-space: nowrap;
        }

        /* ─── EXECUTE BUTTON ─── */
        .exec-btn {
            flex-shrink: 0;
            height: 52px;
            background: #0a0f18;
            border: none; border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--font-display); font-size: 16px; letter-spacing: 0.5em;
            text-transform: uppercase; cursor: not-allowed; opacity: 0.4;
            transition: all 0.3s;
        }
        .exec-btn.active {
            background: #fff; color: #080C14;
            cursor: pointer; opacity: 1;
        }
        .exec-btn.active:active { transform: scale(0.98); }

        /* ─── LOG ─── */
        .log-area {
            height: 48px; overflow: hidden;
            padding: 6px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .log-line {
            font-family: var(--font-mono); font-size: 9px;
            color: var(--text-muted); line-height: 1.6;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .log-line.latest { color: var(--emerald); }

        /* ─── SCORE BAR ─── */
        .score-bar {
            height: 52px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .legend-row { display: flex; gap: 12px; align-items: center; }
        .legend-item {
            display: flex; align-items: center; gap: 5px;
            font-size: 8px; font-weight: 700; letter-spacing: 0.3em;
            color: var(--text-muted); text-transform: uppercase;
        }
        .legend-dot { width: 7px; height: 7px; border-radius: 2px; }
        .score-val {
            font-family: var(--font-display);
            font-size: 32px; color: #fff; letter-spacing: 0.04em;
        }
        .score-val span { font-size: 14px; color: var(--text-muted); margin-left: 2px; }

        /* ─── OVERLAYS ─── */
        .overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 150;
        }
        .overlay.hidden { display: none; }
        .exec-overlay {
            background: rgba(8,12,20,0.7);
            backdrop-filter: blur(8px);
        }
        .exec-spinner {
            font-family: var(--font-display);
            font-size: 13px; letter-spacing: 0.6em; color: #fff;
            text-transform: uppercase; animation: pulse 0.8s infinite;
        }

        /* ─── RESULT OVERLAY ─── */
        .result-overlay {
            background: rgba(8,12,20,0.96);
            backdrop-filter: blur(24px);
            flex-direction: column;
        }
        .result-box {
            width: 94%; max-height: 90%;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            background: var(--surface);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .result-hdr {
            padding: 20px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .result-title {
            font-family: var(--font-display);
            font-size: 11px; letter-spacing: 0.6em; color: var(--gold);
            text-transform: uppercase;
        }
        .result-list {
            flex: 1; overflow-y: auto; padding: 12px 20px;
            scrollbar-width: thin; scrollbar-color: #1a2535 transparent;
        }
        .result-block {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            opacity: 0; animation: slide-in 0.5s forwards;
        }
        .result-block:last-child { border-bottom: none; }
        @keyframes slide-in { to{opacity:1;transform:none} from{opacity:0;transform:translateY(-20px)} }
        .result-block-name {
            font-family: var(--font-display);
            font-size: 15px; color: var(--gold); letter-spacing: 0.3em;
            margin-bottom: 10px;
            padding-left: 10px; border-left: 3px solid var(--gold);
        }
        .result-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin-bottom: 8px; padding-left: 4px;
        }
        .result-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
        .result-text { font-size: 12px; line-height: 1.5; color: #aabbcc; }
        .result-text .success { color: var(--emerald); font-weight: 700; display: block; font-size: 11px; margin-top: 3px; }
        .result-text .fail { color: var(--rose); font-weight: 700; display: block; font-size: 11px; margin-top: 3px; }
        .result-next {
            flex-shrink: 0;
            height: 52px; border: none; border-top: 1px solid var(--border);
            background: #fff; color: #080C14;
            font-family: var(--font-display); font-size: 15px; letter-spacing: 0.5em;
            text-transform: uppercase; cursor: pointer; transition: background 0.2s;
        }
        .result-next:hover { background: #d4fae9; }

        /* ─── FINAL MODAL ─── */
        #summary-modal {
            position: fixed; inset: 0;
            background: rgba(8,12,20,0.98);
            z-index: 250;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        #summary-modal.hidden { display: none; }
        .summary-box {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px; padding: 36px 28px;
            text-align: center; width: 100%;
        }
        .summary-title {
            font-family: var(--font-display);
            font-size: 44px; color: #fff; letter-spacing: 0.04em;
            margin-bottom: 24px; line-height: 1;
        }
        .summary-num {
            font-family: var(--font-display);
            font-size: 72px; color: var(--emerald); line-height: 1;
            margin: 16px 0;
        }
        .summary-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5em; color: var(--text-muted); text-transform: uppercase; }
        .summary-restart {
            margin-top: 28px; width: 100%; height: 52px;
            background: #fff; color: #080C14;
            border: none; border-radius: 14px;
            font-family: var(--font-display); font-size: 15px; letter-spacing: 0.5em;
            text-transform: uppercase; cursor: pointer;
        }

        /* ─── TOOLS ─── */
        .tool-row {
            position: absolute; top: 16px; right: 16px;
            display: flex; gap: 6px; z-index: 200;
        }
        .tool-btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; padding: 6px; cursor: pointer; color: var(--text-muted);
            font-size: 13px; transition: all 0.2s; line-height: 1;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    </style>
</head>
<body>
<div id="app">

    <!-- TOOLS -->
    <div class="tool-row">
        <button class="tool-btn" onclick="saveToLocal()" title="Save">💾</button>
        <button class="tool-btn" onclick="exportHTML()" title="Export">⬇</button>
    </div>

    <!-- HEADER -->
    <div class="hdr">
        <div class="hdr-top">
            <div>
                <div class="hdr-label">The Enterprise Command</div>
                <div class="hdr-phase" id="phase-display">FY26M1</div>
            </div>
            <div class="hdr-mh">
                <div class="hdr-mh-label">Resource MH</div>
                <div class="hdr-mh-val" id="mh-display">20</div>
            </div>
        </div>
        <div class="share-bar" id="share-bar"></div>
    </div>

    <!-- GRID AREA -->
    <div class="grid-wrap">
        <div id="grid"></div>

        <!-- Side Panel -->
        <div class="side-panel" id="side-panel">
            <div class="sp-header">
                <span class="sp-tag">Target Intel</span>
                <button class="sp-close" id="close-panel">✕</button>
            </div>
            <div class="sp-name" id="sp-name">—</div>
            <div class="sp-full" id="sp-full">—</div>
            <div class="sp-stat-row">
                <div class="sp-stat">
                    <div class="sp-stat-label">Visit</div>
                    <div class="sp-stat-val" id="sp-visit">0</div>
                </div>
                <div class="sp-stat">
                    <div class="sp-stat-label">Study</div>
                    <div class="sp-stat-val" id="sp-study">0</div>
                </div>
            </div>
            <div>
                <div class="sp-win" id="sp-win">—%</div>
                <div style="font-size:8px;letter-spacing:0.4em;color:var(--text-muted);text-transform:uppercase;margin-top:2px;">Capture Prob</div>
            </div>
            <div>
                <div class="sp-vendor-label">Existing Provider</div>
                <div class="sp-vendor-val" id="sp-vendor">—</div>
            </div>
            <div>
                <div class="sp-vendor-label">Phase Vector</div>
                <div class="sp-status" id="sp-status">—</div>
            </div>
            <div class="sp-btns">
                <button class="sp-btn" onclick="addTask('VISIT',5,'訪問')">Visit &nbsp;&nbsp;(-5 MH)</button>
                <button class="sp-btn" onclick="addTask('STUDY',8,'勉強会')">Study &nbsp;&nbsp;(-8 MH)</button>
                <button class="sp-btn primary" id="sp-proposal-btn" onclick="addTask('PROPOSAL',10,'提案')" disabled>Proposal (-10 MH)</button>
            </div>
        </div>

        <!-- Exec Overlay -->
        <div class="overlay exec-overlay hidden" id="exec-overlay">
            <div class="exec-spinner">Analyzing Strategic Output…</div>
        </div>

        <!-- Result Overlay -->
        <div class="overlay result-overlay hidden" id="result-overlay">
            <div class="result-box">
                <div class="result-hdr">
                    <span class="result-title">Intel Sequence Report</span>
                    <span style="font-size:18px;">📡</span>
                </div>
                <div class="result-list" id="result-list"></div>
                <button class="result-next" onclick="closeResult()">Next Cycle ›</button>
            </div>
        </div>
    </div>

    <!-- TASK STRIP -->
    <div class="task-strip" id="task-strip">
        <span class="task-standby">>>> MISSION ON STANDBY</span>
    </div>

    <!-- EXECUTE BUTTON -->
    <button class="exec-btn" id="exec-btn" disabled onclick="executeStrategy()">
        Launch Mission
    </button>

    <!-- LOG -->
    <div class="log-area" id="log-area"></div>

    <!-- SCORE BAR -->
    <div class="score-bar">
        <div class="legend-row">
            <div class="legend-item"><div class="legend-dot" style="background:var(--vendor-H-bright)"></div>SELF</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--vendor-I-bright)"></div>RVL-I</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--vendor-A-bright)"></div>RVL-A</div>
        </div>
        <div class="score-val" id="score-val">¥0<span>M</span></div>
    </div>
</div>

<!-- FINAL MODAL -->
<div id="summary-modal" class="hidden">
    <div class="summary-box">
        <div class="summary-title">FY26<br>Mission Complete</div>
        <div class="summary-label">Aggregated Revenue</div>
        <div class="summary-num" id="final-score">¥0<span style="font-size:32px;color:var(--text-muted);margin-left:8px;">M</span></div>
        <button class="summary-restart" onclick="resetGame()">↩ Restart Simulation</button>
    </div>
</div>

<script>
const MAX_MH = 20;
const VENDORS = {
    H:    { name: 'H社（SELF）', bg: '#0A3D2B', bright: '#00D68F' },
    I:    { name: 'I社',        bg: '#0A1F3D', bright: '#38BDF8' },
    A:    { name: 'A社',        bg: '#2D0A3D', bright: '#A855F7' },
    NONE: { name: '未開拓',      bg: '#080C14', bright: '#1e293b' },
    UNK:  { name: '情報未取得',  bg: '#141C28', bright: '#1e293b' },
};

let state = {
    month: 1,
    mh: MAX_MH,
    sales: 0,
    selectedId: null,
    tasks: [],

// ─── WIN RATE ───
function winRate(c) {
    if (!c) return 0;
    let r = 10;
    if (c.vendor === 'H') r += 40;
    const m = c.mo;
    if (m >= 48 && m < 50) r += 40;
    else if (m >= 50) r -= 20;
    r += c.vc * 5 + c.sc * 10;
    const pending = state.tasks.filter(t => t.cid === c.id);
    pending.forEach(t => { if(t.type==='VISIT') r+=5; if(t.type==='STUDY') r+=10; });
    return Math.min(99, Math.max(5, Math.round(r)));
}

// ─── RENDER ───
function render() {
    // Phase / MH
    document.getElementById('phase-display').textContent = `FY26M${state.month}`;
    const mhEl = document.getElementById('mh-display');
    mhEl.textContent = state.mh;
    mhEl.className = 'hdr-mh-val' + (state.mh < 5 ? ' danger' : '');
    document.getElementById('score-val').innerHTML = `¥${state.sales}<span>M</span>`;

    // Share bar
    const stats = {H:0,I:0,A:0,NONE:0};
    state.customers.forEach(c => { stats[c.vendor] = (stats[c.vendor]||0) + c.budget; });
    const total = Object.values(stats).reduce((a,b)=>a+b,0)||1;
    const bar = document.getElementById('share-bar');
    bar.innerHTML = '';
    [['H','#00D68F'],['I','#38BDF8'],['A','#A855F7'],['NONE','#1e293b']].forEach(([v,col])=>{
        const pct = (stats[v]||0)/total*100;
        if (pct>0) {
            const d = document.createElement('div');
            d.className='share-seg';
            d.style.cssText=`width:${pct}%;background:${col};opacity:${v==='H'?1:0.5}`;
            bar.appendChild(d);
        }
    });

    // Grid (6×6 = 36 tiles)
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const tiles = [];
    state.customers.forEach(c => {
        const known = c.vc > 0 || c.vendor === 'H';
        const rfp  = known && c.mo >= 48 && c.mo < 50;
        const bld  = known && c.mo >= 50;
        const inc  = state.incidents.some(i=>i.cid===c.id);
        for (let i=0;i<c.tiles;i++) tiles.push({id:c.id,vendor:c.vendor,year:Math.ceil(c.mo/12),rfp,bld,known,inc});
    });
    while(tiles.length<36) tiles.push({id:null,vendor:'NONE',year:0,rfp:false,bld:false,known:false,inc:false});

    tiles.slice(0,36).forEach(t => {
        const el = document.createElement('div');
        el.className = 'tile';
        const vd = VENDORS[t.known ? t.vendor : 'UNK'];
        el.style.background = vd.bg;
        if (t.rfp) el.classList.add('rfp-anim');
        else if (t.bld) el.classList.add('build-anim');
        if (t.inc) el.classList.add('incident-anim');
        if (state.changedIds.includes(t.id)) el.classList.add('changed-anim');
        if (state.selectedId === t.id) el.classList.add('selected');
        if (t.year > 0) {
            const sp = document.createElement('span');
            sp.className = 't-label';
            sp.textContent = t.known ? `Y${t.year}` : 'Y?';
            el.appendChild(sp);
        }
        if (t.id) el.onclick = e => { e.stopPropagation(); state.selectedId = t.id; render(); };
        grid.appendChild(el);
    });

    // Side panel
    const panel = document.getElementById('side-panel');
    if (state.selectedId) {
        const c = state.customers.find(x=>x.id===state.selectedId);
        panel.classList.add('open');
        document.getElementById('sp-name').textContent  = c.name;
        document.getElementById('sp-full').textContent  = c.full;
        document.getElementById('sp-visit').textContent = c.vc;
        document.getElementById('sp-study').textContent = c.sc;
        document.getElementById('sp-win').textContent   = `${winRate(c)}%`;
        document.getElementById('sp-vendor').textContent = VENDORS[c.vendor].name;

        const known = c.vc>0 || c.vendor==='H';
        const statusEl = document.getElementById('sp-status');
        const propBtn = document.getElementById('sp-proposal-btn');
        const isRFP = c.mo>=48&&c.mo<50;
        if (!known) {
            statusEl.textContent = '情報未取得'; statusEl.className = 'sp-status unknown';
        } else if (c.mo>=50) {
            statusEl.textContent = `構築フェーズ (M${c.mo})`; statusEl.className = 'sp-status build';
        } else if (isRFP) {
            statusEl.textContent = `📄 提案依頼中 (M${c.mo})`; statusEl.className = 'sp-status rfp';
        } else {
            statusEl.textContent = `通常運用 (M${c.mo})`; statusEl.className = 'sp-status';
        }
        propBtn.disabled = !(known && isRFP);
    } else {
        panel.classList.remove('open');
    }

    // Task strip
    const strip = document.getElementById('task-strip');
    strip.innerHTML = '';
    if (state.tasks.length === 0) {
        const sp = document.createElement('span');
        sp.className = 'task-standby';
        sp.textContent = '>>> MISSION ON STANDBY';
        strip.appendChild(sp);
    } else {
        state.tasks.forEach((t,i) => {
            const chip = document.createElement('div');
            chip.className = 'task-chip';
            chip.innerHTML = `<span class="task-chip-name">${t.cname}</span><span>${t.label}</span><button class="task-chip-rm" onclick="removeTask(${i})">✕</button>`;
            strip.appendChild(chip);
        });
    }

    // Exec button
    const btn = document.getElementById('exec-btn');
    if (state.tasks.length > 0) {
        btn.disabled = false;
        btn.classList.add('active');
    } else {
        btn.disabled = true;
        btn.classList.remove('active');
    }

    // Log
    const logEl = document.getElementById('log-area');
    logEl.innerHTML = '';
    state.logs.slice(0,3).forEach((l,i) => {
        const d = document.createElement('div');
        d.className = 'log-line' + (i===0?' latest':'');
        d.textContent = (i===0?'>>> ':'... ') + l;
        logEl.appendChild(d);
    });
}

// ─── TASK MANAGEMENT ───
function addTask(type, cost, label) {
    if (!state.selectedId) return;
    if (state.mh < cost) { state.logs.unshift('! 工数不足。'); render(); return; }
    const c = state.customers.find(x=>x.id===state.selectedId);
    if (type==='PROPOSAL') {
        if (!(c.mo>=48&&c.mo<50)) { state.logs.unshift(`! ${c.name} は提案フェーズ未到達。`); render(); return; }
    }
    state.tasks.push({ cid:c.id, cname:c.name, type, cost, label });
    state.mh -= cost;
    render();
}

function removeTask(i) {
    state.mh += state.tasks[i].cost;
    state.tasks.splice(i,1);
    render();
}

// ─── EXECUTE ───
async function executeStrategy() {
    document.getElementById('exec-overlay').classList.remove('hidden');
    let gained = 0;
    let changed = [];
    const monthResults = {};
    const interacted = [...new Set(state.tasks.map(t=>t.cid))];
    interacted.forEach(id=>{ monthResults[id]=[]; });

    state.logs.unshift(`--- FY26M${state.month} ミッション始動 ---`);

    for (const task of state.tasks) {
        await new Promise(r=>setTimeout(r,400));
        const c = state.customers.find(x=>x.id===task.cid);
        if (task.type==='VISIT') {
            c.vc++;
            monthResults[c.id].push({ icon:'👁', text:`${c.name} への戦略訪問完了。インテリジェンス更新。`, self:true });
            state.logs.unshift(`[SELF] ${c.name} 訪問完了`);
        } else if (task.type==='STUDY') {
            c.sc++;
            monthResults[c.id].push({ icon:'📚', text:`${c.name} 勉強会実施。信頼関係強化。`, self:true });
            state.logs.unshift(`[SELF] ${c.name} 勉強会完了`);
        } else if (task.type==='PROPOSAL') {
            const ok = Math.random()*100 < winRate(c);
            if (ok) {
                c.vendor='H'; c.mo=1; c.vc=1; c.sc=0;
                gained += c.budget; changed.push(c.id);
                monthResults[c.id].push({ icon:'✅', text:`H社が ${c.name} に本提案。`, result:`受注確定。ターゲット制圧。`, success:true });
                state.logs.unshift(`[SUCCESS] ${c.name} 制圧！`);
            } else {
                monthResults[c.id].push({ icon:'❌', text:`H社が ${c.name} に本提案。`, result:`敵の守備を崩せず失注。`, success:false });
                state.logs.unshift(`[FAILED] ${c.name} 失注`);
            }
        }
        render();
    }

    // Incidents
    state.customers.forEach(c => {
        if (Math.random() < 1/30) {
            state.incidents.push({cid:c.id});
            if (!interacted.includes(c.id)) { interacted.push(c.id); monthResults[c.id]=[]; }
            if (c.vendor==='H') {
                state.mh = Math.max(0, state.mh-5);
                monthResults[c.id].push({icon:'🚨', text:`緊急: ${c.name} でシステム障害。MH-5で復旧。`, self:true});
            } else {
                monthResults[c.id].push({icon:'⚡', text:`${VENDORS[c.vendor].name} が ${c.name} のトラブル対応中。`, self:false});
            }
        }
    });

    state.sales += gained;
    state.tasks = [];

    // Rival moves
    state.logs.unshift(`--- 競合ベンダー同期 ---`);
    for (const rid of ['I','A']) {
        await new Promise(r=>setTimeout(r,300));
        const rfpTargets = state.customers.filter(c=>c.vendor!==rid&&c.mo>=48&&c.mo<50);
        if (rfpTargets.length) {
            const tgt = rfpTargets[Math.floor(Math.random()*rfpTargets.length)];
            const ok = Math.random()*100 < 25;
            if (!interacted.includes(tgt.id)) { interacted.push(tgt.id); monthResults[tgt.id]=[]; }
            monthResults[tgt.id].push({
                icon: ok?'💀':'🛡',
                text:`${VENDORS[rid].name} が ${tgt.name} へ電撃提案。`,
                result: ok?`${VENDORS[rid].name} が受注。`:`${VENDORS[rid].name} は失注。`,
                success: ok, rival: true
            });
            if (ok) { tgt.vendor=rid; tgt.mo=1; tgt.vc=0; tgt.sc=0; changed.push(tgt.id); state.logs.unshift(`[${rid}] ${tgt.name} 被占領`); }
        }
    }

    // Advance months
    state.customers.forEach(c=>{ c.mo = c.mo>=60?1:c.mo+1; });
    state.changedIds = changed;

    document.getElementById('exec-overlay').classList.add('hidden');

    // Build result list
    const list = document.getElementById('result-list');
    list.innerHTML = '';
    let delay = 0;
    for (const cid of interacted) {
        const c = state.customers.find(x=>x.id===cid);
        if (!monthResults[cid]||monthResults[cid].length===0) continue;
        const block = document.createElement('div');
        block.className = 'result-block';
        block.style.animationDelay = `${delay*0.4}s`;
        delay++;
        let html = `<div class="result-block-name">${c.name} Intel</div>`;
        monthResults[cid].forEach(r => {
            html += `<div class="result-row">
                <span class="result-icon">${r.icon}</span>
                <div class="result-text">${r.text}
                    ${r.result?`<span class="${r.success?'success':'fail'}">${r.result}</span>`:''}
                </div>
            </div>`;
        });
        block.innerHTML = html;
        list.appendChild(block);
    }
    if (interacted.length===0) {
        list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-family:var(--font-mono);font-size:11px;letter-spacing:0.5em;">SILENCE SECTOR<br>NO DATA FEED</div>';
    }

    document.getElementById('result-overlay').classList.remove('hidden');
    localStorage.setItem('ent_state', JSON.stringify(state));
}

function closeResult() {
    document.getElementById('result-overlay').classList.add('hidden');
    if (state.month >= 12) {
        document.getElementById('final-score').innerHTML = `¥${state.sales}<span style="font-size:32px;color:var(--text-muted);margin-left:8px;">M</span>`;
        document.getElementById('summary-modal').classList.remove('hidden');
    } else {
        state.month++;
        state.mh = MAX_MH;
        state.changedIds = [];
        state.incidents = [];
        render();
    }
}

function resetGame() { localStorage.removeItem('ent_state'); location.reload(); }
function saveToLocal() { localStorage.setItem('ent_state', JSON.stringify(state)); state.logs.unshift('ローカルセーブ完了。'); render(); }
function exportHTML() {
    const blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `TheEnterprise_FY26M${state.month}.html`;
    a.click();
}

window.onload = () => {
    const saved = localStorage.getItem('ent_state');
    if (saved) {
        try {
            state = JSON.parse(saved);
            state.tasks = [];
            state.mh = MAX_MH;
            state.incidents = state.incidents || [];
        } catch(e) {}
    }
    document.getElementById('close-panel').onclick = () => { state.selectedId = null; render(); };
    document.addEventListener('click', e => {
        const panel = document.getElementById('side-panel');
        const grid  = document.getElementById('grid');
        if (!panel.contains(e.target) && !grid.contains(e.target)) {
            state.selectedId = null;
            panel.classList.remove('open');
        }
    });
    render();
};
