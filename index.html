<!-- UI完全維持 / 内部完全リファクタ -->

<script>
/* ================= CONFIG ================= */
const CONFIG = {
  MAX_MAN_HOURS: 20,
  LOG_LIMIT: 60
};

/* ================= STORE ================= */
const Store = {
  state: null,

  init(initial) {
    this.state = initial;
  },

  get() {
    return this.state;
  },

  set(updater) {
    this.state = updater(this.state);
    UI.renderAll();
  }
};

/* ================= UTILS ================= */
const delay = (ms) => new Promise(res => setTimeout(res, ms));

const addLog = (msg) => {
  const s = Store.get();
  s.logs.unshift(msg);
  if (s.logs.length > CONFIG.LOG_LIMIT) s.logs.pop();
};

/* ================= GAME ================= */
const Game = {

  winRate(target) {
    if (!target) return 0;
    let base = 10;
    if (target.vendor === 'H') base += 40;

    if (target.internalMonth >= 48 && target.internalMonth < 50) base += 40;
    else if (target.internalMonth >= 50) base -= 20;

    base += target.visitCount * 5;
    base += target.studyCount * 10;

    return Math.min(Math.max(base, 5), 99);
  },

  addTask(type, cost, label) {
    Store.set(state => {
      if (state.manHours < cost) {
        addLog("! 工数不足");
        return state;
      }

      const c = state.customers.find(x => x.id === state.selectedId);
      if (!c) return state;

      return {
        ...state,
        manHours: state.manHours - cost,
        pendingTasks: [...state.pendingTasks, {
          customerId: c.id,
          customerName: c.name,
          type,
          cost,
          label
        }]
      };
    });
  },

  removeTask(index) {
    Store.set(state => {
      const task = state.pendingTasks[index];
      return {
        ...state,
        manHours: state.manHours + task.cost,
        pendingTasks: state.pendingTasks.filter((_, i) => i !== index)
      };
    });
  },

  async execute() {
    const state = Store.get();
    DOM.execOverlay.classList.remove('hidden');

    let turnSales = 0;
    let turnChanges = [];

    for (let task of state.pendingTasks) {
      await delay(300);
      const c = state.customers.find(x => x.id === task.customerId);

      if (task.type === 'VISIT') {
        c.visitCount++;
        addLog(`訪問 ${c.name}`);
      }

      if (task.type === 'PARTNER') {
        c.studyCount++;
        addLog(`勉強会 ${c.name}`);
      }

      if (task.type === 'PROPOSAL') {
        if (Math.random() * 100 < Game.winRate(c)) {
          c.vendor = 'H';
          c.internalMonth = 1;
          turnSales += c.budget;
          turnChanges.push(c.id);
          addLog(`成功 ${c.name}`);
        } else {
          addLog(`失敗 ${c.name}`);
        }
      }

      UI.renderAll();
    }

    Store.set(s => ({
      ...s,
      sales: s.sales + turnSales,
      pendingTasks: [],
      month: s.month + 1,
      manHours: CONFIG.MAX_MAN_HOURS,
      changedIds: turnChanges
    }));

    DOM.execOverlay.classList.add('hidden');
  }
};

/* ================= DOM CACHE ================= */
const DOM = {
  grid: document.getElementById('grid'),
  taskList: document.getElementById('task-list'),
  logFeed: document.getElementById('log-feed'),
  phase: document.getElementById('phase-display'),
  mh: document.getElementById('man-hours-display'),
  sales: document.getElementById('sales-display'),
  execOverlay: document.getElementById('exec-overlay')
};

/* ================= UI ================= */
const UI = {

  renderHeader() {
    const s = Store.get();
    DOM.phase.innerText = `FY26M${s.month}`;
    DOM.mh.innerHTML = `${s.manHours}<span class="text-xs opacity-20 ml-2">/ ${CONFIG.MAX_MAN_HOURS}</span>`;
    DOM.sales.innerHTML = `¥${s.sales}<span class="text-[14px] ml-1 opacity-20">M</span>`;
  },

  renderGrid() {
    const s = Store.get();
    DOM.grid.innerHTML = '';

    let tiles = [];

    s.customers.forEach(c => {
      const year = Math.ceil(c.internalMonth / 12);
      for (let i = 0; i < c.tileCount; i++) {
        tiles.push({ c, year });
      }
    });

    while (tiles.length < 64) tiles.push(null);

    tiles.slice(0, 64).forEach(t => {
      const div = document.createElement('div');
      div.className = "w-full aspect-square border border-white/10";

      if (t) {
        div.style.background = VENDORS[t.c.vendor].color;
        div.innerText = "Y" + t.year;

        div.onclick = () => {
          Store.set(s => ({ ...s, selectedId: t.c.id }));
        };
      }

      DOM.grid.appendChild(div);
    });
  },

  renderTasks() {
    const s = Store.get();
    DOM.taskList.innerHTML = s.pendingTasks.map((t, i) =>
      `<div>${t.customerName}:${t.label}
       <button onclick="Game.removeTask(${i})">x</button></div>`
    ).join("");
  },

  renderLogs() {
    const s = Store.get();
    DOM.logFeed.innerHTML = s.logs.map(l => `<div>${l}</div>`).join("");
  },

  renderAll() {
    this.renderHeader();
    this.renderGrid();
    this.renderTasks();
    this.renderLogs();
  }
};

/* ================= INIT ================= */
window.onload = () => {
  Store.init(state);
  UI.renderAll();

  document.getElementById('execute-btn').onclick = Game.execute;
};
</script>
