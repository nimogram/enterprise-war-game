<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>THE ENTERPRISE: 覇権奪還</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --emerald: #00D68F;
            --rose: #FF4D6D;
            --sky: #38BDF8;
            --amber: #F59E0B;
            --bg: #080C14;
            --surface: #0D1420;
            --border: rgba(255,255,255,0.06);
            --text-muted: #3a4a60;
            --font-display: 'Bebas Neue', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --font-body: 'Outfit', sans-serif;
            /* Vendor colors */
            --vendor-H: #00D68F; 
            --vendor-I: #0A1F3D;
            --vendor-I-bright: #38BDF8;
            --vendor-A: #2D0A3D;
            --vendor-A-bright: #A855F7;
            --vendor-S: #451A03;
            --vendor-S-bright: #F59E0B;
            --vendor-UNKNOWN: #141C28;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: #8899aa;
            min-height: 100dvh;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
            pointer-events: none; z-index: 9999;
        }

        #app {
            width: 100%; max-width: 430px;
            height: 100dvh;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            background: var(--bg);
        }

        /* ─── ANIMATIONS ─── */
        #game-start-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; background: rgba(8, 12, 20, 0);
            transition: background 0.5s;
        }
        .start-banner {
            font-family: var(--font-display);
            font-size: 72px; color: #fff; letter-spacing: 0.2em;
            text-shadow: 0 0 30px var(--emerald);
            transform: translateX(-150%);
            opacity: 0;
        }
        .start-banner.animate {
            animation: slide-in-out 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slide-in-out {
            0% { transform: translateX(-120%); opacity: 0; }
            20% { transform: translateX(0); opacity: 1; }
            80% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(120%); opacity: 0; }
        }

        /* ─── HEADER ─── */
        .hdr { padding: 16px 20px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: rgba(8,12,20,0.8); z-index: 10; }
        .hdr-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .hdr-label {
            font-family: var(--font-display); font-size: 9px; letter-spacing: 0.6em;
            color: var(--gold); line-height: 1; margin-bottom: 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .hdr-label::before {
            content: ''; display: inline-block; width: 5px; height: 5px;
            background: var(--gold); border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .hdr-phase { font-family: var(--font-display); font-size: 48px; color: #fff; line-height: 1; letter-spacing: 0.04em; }
        .hdr-mh { text-align: right; }
        .hdr-mh-label { font-size: 8px; font-weight: 700; letter-spacing: 0.4em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
        .hdr-mh-val { font-family: var(--font-display); font-size: 38px; color: var(--emerald); line-height: 1; }
        .hdr-mh-val.danger { color: var(--rose); }

        /* ─── SHARE BAR ─── */
        .share-bar {
            height: 20px; display: flex; overflow: hidden; margin: 12px 20px 4px;
            border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.02);
        }
        .share-seg { 
            height: 100%; transition: width 0.8s ease; 
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-size: 9px; color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5); white-space: nowrap;
        }

        /* ─── GRID AREA ─── */
        .grid-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px 16px; position: relative; overflow: hidden; }
        #grid { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr); gap: 5px; width: 100%; max-width: 380px; aspect-ratio: 1; }
        .tile {
            aspect-ratio: 1; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.05);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            position: relative; transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            user-select: none;
        }
        .tile:active { transform: scale(0.9); }
        .tile.selected {
            border-color: #fff !important; box-shadow: 0 0 16px rgba(255,255,255,0.4), inset 0 0 8px rgba(255,255,255,0.05);
            transform: scale(1.08); z-index: 10;
        }
        .tile .t-label { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.6); pointer-events: none; font-weight: 500; }
        
        @keyframes rfp-glow {
            0%,100% { box-shadow: 0 0 10px var(--gold), inset 0 0 6px rgba(201,168,76,0.15); border-color: var(--gold); }
            50%      { box-shadow: 0 0 20px var(--gold), inset 0 0 12px rgba(201,168,76,0.25); border-color: #ffe68a; }
        }
        @keyframes build-glow {
            0%,100% { box-shadow: 0 0 8px rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
            50%      { box-shadow: 0 0 16px rgba(255,255,255,0.5); border-color: #fff; }
        }
        @keyframes changed-glow {
            0%,100% { box-shadow: 0 0 14px #f472b6; border-color: #f472b6; }
            50%      { box-shadow: 0 0 28px #f472b6, inset 0 0 10px rgba(244,114,182,0.2); border-color: #fce7f3; }
        }
        @keyframes incident-flash { 0%,100%{background-color:#5c0a0a} 50%{background-color:#b91c1c} }
        .tile.rfp-anim    { animation: rfp-glow 1.2s infinite ease-in-out; }
        .tile.build-anim  { animation: build-glow 1.6s infinite ease-in-out; }
        .tile.changed-anim{ animation: changed-glow 1.0s infinite ease-in-out; }
        .tile.incident-anim{ animation: incident-flash 0.6s infinite ease-in-out; }

        /* ─── SIDE PANEL ─── */
        .side-panel {
            position: absolute; top: 0; right: 0; bottom: 0; width: 80%;
            background: rgba(10,16,28,0.3); backdrop-filter: blur(40px);
            border-left: 1px solid var(--border); padding: 20px 18px;
            display: flex; flex-direction: column; gap: 12px; z-index: 120;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        .side-panel.open { transform: translateX(0); }
        .sp-header { display: flex; justify-content: space-between; align-items: center; }
        .sp-tag { font-size: 8px; font-weight: 700; letter-spacing: 0.5em; color: var(--emerald); text-transform: uppercase; }
        .sp-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; font-size: 20px; }
        .sp-name { font-family: var(--font-display); font-size: 24px; color: #fff; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-full { font-size: 11px; color: #556677; line-height: 1.5; border-left: 3px solid var(--gold); padding-left: 8px; }
        .sp-stat-row { display: flex; gap: 8px; }
        .sp-stat { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
        .sp-stat-label { font-size: 7px; font-weight: 700; letter-spacing: 0.4em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .sp-stat-val { font-family: var(--font-display); font-size: 24px; color: #fff; }
        .sp-win { font-family: var(--font-display); font-size: 48px; color: var(--emerald); line-height: 1; }
        .sp-vendor-val { font-family: var(--font-display); font-size: 16px; color: var(--gold); letter-spacing: 0.1em; }
        .sp-status { font-size: 11px; font-weight: 600; color: #fff; }
        .sp-btns { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
        .sp-btn {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08);
            color: #667788; border-radius: 12px; padding: 10px;
            font-family: var(--font-display); font-size: 14px; letter-spacing: 0.12em;
            cursor: pointer; transition: all 0.2s; text-transform: uppercase;
        }
        .sp-btn.primary { background: rgba(0,214,143,0.1); border-color: var(--emerald); color: var(--emerald); }
        .sp-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* ─── TASK STRIP ─── */
        .task-strip {
            height: 56px; overflow-x: auto; overflow-y: hidden; display: flex; align-items: center; gap: 6px;
            padding: 0 16px; border-top: 1px solid var(--border); scrollbar-width: none; flex-shrink: 0;
        }
        .task-chip {
            flex-shrink: 0; display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 4px 10px 4px 12px; font-size: 10px; font-weight: 600; color: #cce;
            white-space: nowrap;
        }
        .task-chip-rm { background: none; border: none; color: #556677; cursor: pointer; font-size: 14px; }
        .task-standby { font-size: 10px; font-weight: 700; letter-spacing: 0.5em; color: var(--text-muted); text-transform: uppercase; font-family: var(--font-mono); }

        /* ─── EXECUTE BUTTON ─── */
        .exec-btn {
            flex-shrink: 0; height: 52px; background: #0a0f18; border: none; border-top: 1px solid var(--border);
            color: var(--text-muted); font-family: var(--font-display); font-size: 16px; letter-spacing: 0.5em;
            text-transform: uppercase; cursor: not-allowed; opacity: 0.4; transition: all 0.3s;
        }
        .exec-btn.active { background: #fff; color: #080C14; cursor: pointer; opacity: 1; }

        /* ─── LOG ─── */
        .log-area { height: 48px; overflow: hidden; padding: 6px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .log-line { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); line-height: 1.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .log-line.latest { color: var(--emerald); }

        /* ─── SCORE BAR ─── */
        .score-bar { height: 52px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .score-val { font-family: var(--font-display); font-size: 32px; color: #fff; letter-spacing: 0.04em; }
        .score-val span { font-size: 14px; color: var(--text-muted); margin-left: 2px; }

        /* ─── OVERLAYS ─── */
        .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 150; }
        .overlay.hidden { display: none; }
        .exec-overlay { background: rgba(8,12,20,0.75); backdrop-filter: blur(8px); }
        .result-overlay { background: rgba(8, 12, 20, 0.4); backdrop-filter: blur(12px); flex-direction: column; }
        .result-box {
            width: 94%; max-height: 90%; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px; background: rgba(13, 20, 32, 0.7); 
            backdrop-filter: blur(32px); display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .result-hdr { padding: 24px 20px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .result-title {
            font-family: var(--font-display);
            font-size: 22px; letter-spacing: 0.4em; color: var(--gold);
            text-transform: uppercase;
        }

        .result-list { flex: 1; overflow-y: auto; padding: 12px 20px; scrollbar-width: none; }
        .result-list::-webkit-scrollbar { display: none; }
        .result-block { padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.04); opacity: 0; transform: translateY(-20px); animation: slide-flow-down 0.8s forwards; }
        @keyframes slide-flow-down { to { opacity: 1; transform: translateY(0); } }
        .result-next { flex-shrink: 0; height: 52px; border: none; border-top: 1px solid var(--border); background: #fff; color: #080C14; font-family: var(--font-display); font-size: 15px; letter-spacing: 0.5em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
        .result-next:hover { background: var(--emerald); color: #fff; }

        /* ─── FINAL MODAL ─── */
        #summary-modal { position: fixed; inset: 0; background: rgba(8,12,20,0.98); z-index: 250; display: flex; align-items: center; justify-content: center; padding: 16px; }
        #summary-modal.hidden { display: none; }
        .summary-box { background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 32px; padding: 28px 24px; width: 100%; max-height: 94%; overflow-y: auto; text-align: center; }
    </style>
</head>
<body>

<div id="game-start-overlay">
    <div class="start-banner" id="start-banner">GAME START</div>
</div>

<div id="app">
    <div class="hdr">

<script>
const MAX_MH = 20;
const VENDORS = {
    H: { name: 'H社', bg: '#00D68F' }, 
    I: { name: 'I社', bg: '#0A1F3D' },
    A: { name: 'A社', bg: '#2D0A3D' },
    S: { name: 'S社', bg: '#451A03' },
    NONE: { name: '未開拓', bg: '#080C14' },
    UNK: { name: '情報未取得', bg: '#141C28' }
};

let AudioCtx;
function initAudio() {
    if (!AudioCtx) {
        AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSound(type) {
    initAudio();
    if (AudioCtx.state === 'suspended') AudioCtx.resume();
    
    const osc = AudioCtx.createOscillator();
    const gain = AudioCtx.createGain();
    osc.connect(gain); gain.connect(AudioCtx.destination);
    const now = AudioCtx.currentTime;

    switch(type) {
        case 'start':
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(60, now);
            osc.frequency.exponentialRampToValueAtTime(440, now + 0.8);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.8);
            osc.start(); osc.stop(now + 0.8);
            break;
        case 'click':
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, now);
            gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
            break;
        case 'add':
            osc.type = 'square'; osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(880, now + 0.05);
            gain.gain.setValueAtTime(0.02, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
            break;
        case 'success':
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                const o = AudioCtx.createOscillator(); const g = AudioCtx.createGain();
                o.connect(g); g.connect(AudioCtx.destination);
                o.type = 'triangle'; o.frequency.setValueAtTime(f, now + i * 0.1);
                g.gain.setValueAtTime(0.05, now + i * 0.1); g.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.4);
                o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.4);
            });
            break;
        case 'failure':
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.4);
            gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(); osc.stop(now + 0.4);
            break;
    }
}

const CUSTOMER_POOL = [
    { id:101, name:'NIT-Core', full:'ニトリHD: 基幹', budget:120, tiles:5 },
    { id:102, name:'NIT-Logi', full:'ニトリHD: 物流', budget:80,  tiles:4 },
    { id:201, name:'SAP-Net',  full:'札幌市: NW', budget:70,  tiles:4 },
    { id:202, name:'SAP-Win',  full:'札幌市: 窓口', budget:65,  tiles:3 },
    { id:301, name:'HDC-Fin',  full:'道庁: 財務', budget:60,  tiles:3 },
    { id:401, name:'HOU-Edu',  full:'北大: 教育', budget:110, tiles:4 },
    { id:501, name:'TSU-EC',   full:'ツルハ: EC', budget:80,  tiles:3 },
    { id:601, name:'JRH-Tick', full:'JR北: 発券', budget:70,  tiles:4 },
    { id:701, name:'HKL-Agri', full:'ホクレン: 農業', budget:60,  tiles:3 },
    { id:801, name:'AIN-Ph',   full:'アイン: 調剤', budget:50,  tiles:2 },
    { id:901, name:'HBA-Sec',  full:'HBA: セキュ', budget:50,  tiles:2 },
    { id:1001,name:'SAT-POS',  full:'サツドラ: POS', budget:40,  tiles:2 },
    { id:1101,name:'HRP-Base', full:'HARP: 基盤', budget:30,  tiles:1 },
    { id:1201,name:'HPP-Sec',  full:'道警: 公安NW', budget:25,  tiles:1 },
];

let state = {
    month: 1, year: 1, mh: MAX_MH, nextMonthPenalty: 0,
    sales: 0, selectedId: null, tasks: [], logs: ["システム同期完了。"],
    changedIds: [], incidents: [], initialShare: null, customers: [], gridOrder: []
};

function generateGridLayout() {
    let ids = state.customers.map(c => c.id).sort(() => Math.random() - 0.5);
    let tiles = [];
    ids.forEach(cid => {
        const c = state.customers.find(x => x.id === cid);
        for (let i = 0; i < c.tiles; i++) tiles.push({ customerId: c.id });
    });
    while (tiles.length < 36) tiles.push({ customerId: null });
    state.gridOrder = tiles;
}

function initializeEnvironment() {
    const allVendors = ['H', 'I', 'A', 'S'];
    state.customers = CUSTOMER_POOL.map(base => ({
        ...base, 
        vendor: allVendors[Math.floor(Math.random() * 4)],
        mo: Math.floor(Math.random() * 45) + 1, 
        vc: 0, sc: 0, lv: 0,
        reshuffleMonth: Math.floor(Math.random() * 12) + 1 
    }));
    generateGridLayout();
}

function winRate(c) {
    if (!c) return 0;
    let r = 10; if (c.vendor === 'H') r += 40;
    if (c.mo >= 48 && c.mo < 50) r += 40; else if (c.mo >= 50) r -= 20;
    r += c.vc * 5 + c.sc * 10;
    const since = state.month - (c.lv || 0);
    if (since > 1) r -= (since - 1) * 8;
    state.tasks.filter(t => t.cid === c.id).forEach(t => r += (t.type==='VISIT'?5:10));
    return Math.min(99, Math.max(5, Math.round(r)));
}

function calculateShare() {
    const s = { H:0, I:0, A:0, S:0, NONE:0, UNK:0 };
    state.customers.forEach(c => {
        if (s[c.vendor] !== undefined) s[c.vendor] += c.budget;
    });
    return { stats: s, total: Object.values(s).reduce((a, b) => a + b, 0) || 1 };
}

function renderBar(id, data) {
    const c = document.getElementById(id); if(!c) return; c.innerHTML = '';
    const { stats, total } = data;
    ['H','I','A','S'].forEach(v => {
        const p = (stats[v]||0)/total*100;
        if (p>0) {
            const d = document.createElement('div'); d.className='share-seg';
            d.style.cssText=`width:${p}%;background:var(--vendor-${v})`;
            if (p > 5) d.textContent = Math.round(p) + '%';
            c.appendChild(d);
        }
    });
}

function render() {
    document.getElementById('phase-display').textContent = `FY2${state.year+5}M${state.month}`;
    const mhEl = document.getElementById('mh-display');
    mhEl.textContent = state.mh; mhEl.className = 'hdr-mh-val' + (state.mh < 5 ? ' danger' : '');
    document.getElementById('score-val').innerHTML = `¥${state.sales}<span>M</span>`;
    renderBar('share-bar', calculateShare());

    const g = document.getElementById('grid'); g.innerHTML = '';
    state.gridOrder.forEach(tData => {
        const el = document.createElement('div'); el.className = 'tile';
        if (tData.customerId) {
            const c = state.customers.find(x => x.id === tData.customerId);
            const k = c.vc > 0 || c.sc > 0 || c.vendor === 'H';
            const vd = VENDORS[k ? c.vendor : 'UNK'];
            el.style.backgroundColor = vd.bg;
            if (k && c.mo >= 48 && c.mo < 50) el.classList.add('rfp-anim');
            else if (k && c.mo >= 50) el.classList.add('build-anim');
            if (state.incidents.some(i => i.cid === c.id)) el.classList.add('incident-anim');
            if (state.changedIds.includes(c.id)) el.classList.add('changed-anim');
            if (state.selectedId === c.id) el.classList.add('selected');
            const span = document.createElement('span'); span.className = 't-label';
            span.textContent = k ? `Y${Math.ceil(c.mo/12)}` : 'Y?';
            el.appendChild(span);
            el.onclick = e => { e.stopPropagation(); state.selectedId = c.id; playSound('click'); render(); };
        } else { el.style.backgroundColor = VENDORS.NONE.bg; }
        g.appendChild(el);
    });

    const p = document.getElementById('side-panel');
    if (state.selectedId) {
        const c = state.customers.find(x=>x.id===state.selectedId);
        p.classList.add('open');
        document.getElementById('sp-name').textContent = c.name;
        document.getElementById('sp-full').textContent = c.full;
        document.getElementById('sp-visit').textContent = c.vc;
        document.getElementById('sp-study').textContent = c.sc;
        document.getElementById('sp-win').textContent = `${winRate(c)}%`;
        const k = c.vc>0 || c.sc > 0 || c.vendor==='H';
        document.getElementById('sp-vendor').textContent = k ? VENDORS[c.vendor].name : '？';
        const st = document.getElementById('sp-status');
        const isRFP = c.mo>=48 && c.mo<50;
        if (!k) st.textContent = '情報未取得';
        else if (c.mo >= 50) st.textContent = `構築中 (M${c.mo})`;
        else if (isRFP) st.textContent = `📄 RFP放出中 (M${c.mo})`;
        else st.textContent = `通常運用 (M${c.mo})`;
        document.getElementById('sp-proposal-btn').disabled = !(k && isRFP);
    } else p.classList.remove('open');

    const ts = document.getElementById('task-strip'); ts.innerHTML = '';
    if (state.tasks.length === 0) ts.innerHTML = '<span class="task-standby">>>> MISSION ON STANDBY</span>';
    else state.tasks.forEach((t, i) => {
        const c = document.createElement('div'); c.className = 'task-chip';
        c.innerHTML = `<span>${t.cname}</span><span>${t.label}</span><button class="task-chip-rm" onclick="removeTask(${i})">✕</button>`;
        ts.appendChild(c);
    });
    const eb = document.getElementById('exec-btn');
    eb.disabled = state.tasks.length === 0; eb.className = 'exec-btn' + (eb.disabled?'':' active');

    const la = document.getElementById('log-area'); la.innerHTML = '';
    state.logs.slice(0,3).forEach((l,i) => {
        const d = document.createElement('div'); d.className = 'log-line' + (i===0?' latest':'');
        d.textContent = (i===0?'>>> ':'... ') + l; la.appendChild(d);
    });
}

function addTask(type, cost, label) {
    if (!state.selectedId) return;
    if (state.mh < cost) { state.logs.unshift('! 工数不足'); render(); return; }
    const c = state.customers.find(x=>x.id===state.selectedId);
    state.tasks.push({ cid:c.id, cname:c.name, type, cost, label });
    state.mh -= cost; playSound('add'); render();
}

function removeTask(i) {
    state.mh += state.tasks[i].cost;
    state.tasks.splice(i,1); render();
}

async function executeStrategy() {
    playSound('start'); document.getElementById('exec-overlay').classList.remove('hidden');
    let gained = 0; let changed = []; 
    const resMap = {}; 
    
    // 今月アクションを起こした顧客リスト
    const interactedIds = [...new Set(state.tasks.map(t=>t.cid))];
    // 情報を収集した（訪問・勉強会した）顧客リスト
    const infoGatheredIds = [...new Set(state.tasks.filter(t => t.type === 'VISIT' || t.type === 'STUDY').map(t => t.cid))];
    
    interactedIds.forEach(id => resMap[id]=[]);

    for (const t of state.tasks) {
        await new Promise(r=>setTimeout(r,400));
        const c = state.customers.find(x=>x.id===t.cid);
        if (t.type==='VISIT') { 
            c.vc++; c.lv = state.month; 
            resMap[c.id].push({ icon:'👁', text:'[H社] 戦略訪問完了。最新情報を入手。', isSelf: true }); 
        }
        else if (t.type==='STUDY') { 
            c.sc++; c.lv = state.month; 
            resMap[c.id].push({ icon:'📚', text:'[H社] 勉強会実施。受注確度を引き上げ。', isSelf: true }); 
        }
        else if (t.type==='PROPOSAL') {
            const ok = Math.random()*100 < winRate(c); 
            if (ok) { 
                playSound('success'); c.vendor='H'; c.mo=55; c.vc=1; c.sc=0; c.lv = state.month; 
                gained += c.budget; changed.push(c.id); 
                resMap[c.id].push({ icon:'✅', text:'[H社] 受注確定！構築フェーズ(6ヶ月)開始。', isSelf: true }); 
            } else { 
                playSound('failure'); 
                resMap[c.id].push({ icon:'❌', text:'[H社] コンペ敗北。提案が通りませんでした。', isSelf: true }); 
            }
        }
        render();
    }

    // 人事異動・障害
    state.customers.forEach(c => {
        if (c.reshuffleMonth === state.month) {
            c.vc = 0; c.sc = 0; c.lv = 0;
            if(!resMap[c.id]) { interactedIds.push(c.id); resMap[c.id]=[]; } 
            resMap[c.id].push({icon:'👤', text:'[人事] キーマンが異動。リレーションが消失。'}); 
        }
        if (Math.random() < 1/30) {
            state.incidents.push({cid:c.id}); 
            if(!resMap[c.id]) { interactedIds.push(c.id); resMap[c.id]=[]; }
            if (c.vendor==='H') { 
                state.nextMonthPenalty += 5; 
                resMap[c.id].push({icon:'🚨', text:'[障害] システムトラブル発生。次月MH-5。', isSelf: true}); 
            }
            else { resMap[c.id].push({icon:'⚡', text:'[競合] 競合他社でトラブルを検知。'}); }
        }
    });

    state.sales += gained; state.tasks = [];
    const shareData = calculateShare();
    const isHLeader = shareData.stats.H >= Math.max(shareData.stats.I, shareData.stats.A, shareData.stats.S);

    // ライバルのアクション（インテリジェンス報告の修正）
    for (const rid of ['I','A','S']) {
        await new Promise(r=>setTimeout(r,100));

        // 1. 市場全体の動き（ランダムな奪取試行）
        const allPotentialTargets = state.customers.filter(c => c.vendor !== rid);
        if (allPotentialTargets.length > 0) {
            const t = allPotentialTargets[Math.floor(Math.random() * allPotentialTargets.length)];
            const isRFP = t.mo >= 48 && t.mo < 50;
            const power = (isHLeader && t.vendor === 'H') ? (isRFP ? 40 : 20) : (isRFP ? 30 : 10);
            
            if (Math.random() * 100 < power) {
                t.vendor = rid; t.mo = 1; t.vc = 0; t.sc = 0; changed.push(t.id);
                // 奪取されたのが訪問中の顧客なら報告
                if (infoGatheredIds.includes(t.id)) {
                    if (!resMap[t.id]) { interactedIds.push(t.id); resMap[t.id] = []; }
                    resMap[t.id].push({ icon: '⚔️', text: `[${rid}社] 強力な提案により顧客を奪取されました。` });
                }
            }
        }

        // 2. 訪問した顧客に対する詳細スキャン（確実に報告を表示）
        infoGatheredIds.forEach(cid => {
            const t = state.customers.find(x => x.id === cid);
            if (!resMap[cid]) { interactedIds.push(cid); resMap[cid] = []; }
            
            if (t.vendor === rid) {
                // 訪問先がそのライバルの顧客だった場合
                resMap[cid].push({ icon: '🛡', text: `[${rid}社] ベンダー防衛行動を確認。接触を警戒されています。` });
            } else {
                // 訪問先が第三者の顧客だった場合、一定確率で競合の接触を報告
                if (Math.random() < 0.6) {
                    resMap[cid].push({ icon: '🕵️', text: `[${rid}社] 競合営業の接触形跡を捕捉しました。` });
                }
            }
        });
    }

    state.customers.forEach(c => c.mo = c.mo>=60?1:c.mo+1); 
    state.changedIds = changed;
    document.getElementById('exec-overlay').classList.add('hidden');

    const listEl = document.getElementById('result-list'); listEl.innerHTML = '';
    interactedIds.forEach(cid => {
        const c = state.customers.find(x=>x.id===cid);
        const b = document.createElement('div'); b.className = 'result-block';
        let h = `<div style="font-family:var(--font-display);color:var(--gold);font-size:16px;margin-bottom:10px;border-bottom:1px solid var(--border); letter-spacing: 0.1em;">${c.name.toUpperCase()} INTEL REPORT</div>`;
        resMap[cid].forEach(r => {
            const color = r.isSelf ? 'var(--emerald)' : 'inherit';
            h += `<div style="display:flex;gap:10px;font-size:12px;margin-bottom:6px; line-height: 1.4; color: ${color};"><span>${r.icon}</span><span>${r.text}</span></div>`;
        });
        b.innerHTML = h; listEl.appendChild(b);
    });
    document.getElementById('result-overlay').classList.remove('hidden');
}

function closeResult() {
    document.getElementById('result-overlay').classList.add('hidden'); 
    state.selectedId = null; 
    if (state.month >= 12) showFinalSummary();
    else {
        state.month++;
        const hTiles = state.gridOrder.filter(t => t.customerId && state.customers.find(x=>x.id===t.customerId).vendor === 'H').length;
        const maint = Math.min(5, Math.floor(hTiles / 4));
        state.mh = MAX_MH - state.nextMonthPenalty - maint; state.nextMonthPenalty = 0;
        state.changedIds = []; state.incidents = []; render();
    }
}

function triggerStartScreen() {
    const b = document.getElementById('start-banner');
    b.classList.remove('animate'); void b.offsetWidth; b.classList.add('animate');
    const o = document.getElementById('game-start-overlay');
    o.style.background = 'rgba(8,12,20,0.9)';
    setTimeout(() => { o.style.background = 'rgba(8,12,20,0)'; }, 500);
    playSound('start');
}

function showFinalSummary() { document.getElementById('summary-modal').classList.remove('hidden'); }
function continueGame() { 
    state.month = 1; state.year++; 
    state.customers.forEach(c => c.reshuffleMonth = Math.floor(Math.random() * 12) + 1);
    document.getElementById('summary-modal').classList.add('hidden'); 
    render(); 
}
function resetGame() { 
    state.month = 1; state.year = 1; state.sales = 0; 
    initializeEnvironment(); 
    document.getElementById('summary-modal').classList.add('hidden'); 
    triggerStartScreen(); render(); 
}
function saveToLocal() { localStorage.setItem('ent_v17', JSON.stringify(state)); state.logs.unshift('SYSTEM SYNCHRONIZED.'); render(); }

window.onload = () => {
    initializeEnvironment();
    document.getElementById('close-panel').onclick = () => { state.selectedId = null; render(); };
    triggerStartScreen(); render();
};
document.body.addEventListener('click', initAudio, { once: true });
</script>
</body>
